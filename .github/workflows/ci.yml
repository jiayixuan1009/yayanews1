name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build 需要的最小环境变量
          NEXT_PUBLIC_SITE_URL: https://yayanews.cryptooptiontool.com
          NEXT_PUBLIC_PARENT_SITE: https://www.biyapay.com
          NEXT_PUBLIC_TRADING_SITE: https://invest.biyapay.com
          # 数据库连接（build 时 generateStaticParams 需要，但有 try-catch 兜底）
          DATABASE_URL: postgresql://localhost:5432/dummy
